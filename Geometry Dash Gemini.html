<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CUBE DASH</title>
<style>
  /* =============================================
     GLOBAL STYLES & RESET
     ============================================= */
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --neon-cyan:   #00f5ff;
    --neon-pink:   #ff0080;
    --neon-yellow: #ffe600;
    --neon-green:  #39ff14;
    --dark-bg:     #05050f;
    --panel-bg:    rgba(0, 245, 255, 0.04);
    --glow-cyan:   0 0 8px #00f5ff, 0 0 24px #00f5ff55;
    --glow-pink:   0 0 8px #ff0080, 0 0 24px #ff008055;
  }

  html, body {
    width: 100%; height: 100%;
    background: var(--dark-bg);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Orbitron', monospace;
    overflow: hidden;
    user-select: none;
  }

  /* =============================================
     CANVAS WRAPPER
     ============================================= */
  #game-wrap {
    position: relative;
    border: 2px solid var(--neon-cyan);
    box-shadow: var(--glow-cyan), inset 0 0 60px rgba(0,245,255,0.05);
    border-radius: 4px;
    overflow: hidden;
  }

  canvas { display: block; }

  /* =============================================
     OVERLAY SCREENS  (start / game-over)
     ============================================= */
  .screen {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 18px;
    background: rgba(5,5,15,0.88);
    backdrop-filter: blur(4px);
    transition: opacity 0.3s;
  }
  .screen.hidden { opacity: 0; pointer-events: none; }

  .screen h1 {
    font-size: clamp(2rem, 6vw, 3.8rem);
    font-weight: 900;
    letter-spacing: 0.12em;
    color: var(--neon-cyan);
    text-shadow: var(--glow-cyan);
    text-transform: uppercase;
    animation: flicker 3s infinite;
  }
  .screen h2 {
    font-size: clamp(1.1rem, 3vw, 1.8rem);
    font-weight: 700;
    color: var(--neon-pink);
    text-shadow: var(--glow-pink);
    letter-spacing: 0.08em;
  }

  .sub {
    font-family: 'Share Tech Mono', monospace;
    font-size: clamp(0.7rem, 1.8vw, 1rem);
    color: rgba(0,245,255,0.6);
    letter-spacing: 0.06em;
    text-align: center;
    line-height: 1.7;
  }

  .btn {
    margin-top: 10px;
    padding: 14px 44px;
    font-family: 'Orbitron', monospace;
    font-weight: 700;
    font-size: clamp(0.85rem, 2vw, 1.1rem);
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--dark-bg);
    background: var(--neon-cyan);
    border: none; border-radius: 2px;
    cursor: pointer;
    box-shadow: var(--glow-cyan);
    transition: transform 0.1s, box-shadow 0.1s;
  }
  .btn:hover  { transform: scale(1.06); }
  .btn:active { transform: scale(0.97); }

  #score-display {
    position: absolute;
    top: 14px; right: 20px;
    font-family: 'Share Tech Mono', monospace;
    font-size: clamp(0.85rem, 1.8vw, 1.1rem);
    color: var(--neon-yellow);
    text-shadow: 0 0 8px #ffe600, 0 0 20px #ffe60066;
    pointer-events: none;
    letter-spacing: 0.06em;
  }

  #best-display {
    position: absolute;
    top: 36px; right: 20px;
    font-family: 'Share Tech Mono', monospace;
    font-size: clamp(0.7rem, 1.4vw, 0.88rem);
    color: rgba(255,230,0,0.45);
    pointer-events: none;
    letter-spacing: 0.05em;
  }

  /* =============================================
     ANIMATIONS
     ============================================= */
  @keyframes flicker {
    0%,95%,100% { opacity: 1; }
    96%          { opacity: 0.6; }
    97%          { opacity: 1; }
    98%          { opacity: 0.4; }
    99%          { opacity: 0.9; }
  }

  #go-score {
    font-family: 'Share Tech Mono', monospace;
    font-size: clamp(0.9rem, 2.2vw, 1.3rem);
    color: var(--neon-yellow);
    text-shadow: 0 0 12px #ffe600;
    letter-spacing: 0.08em;
  }

  /* =============================================
     NEW: LEVEL BANNER
     ============================================= */
  #level-banner {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-family: 'Orbitron', monospace;
    font-weight: 900;
    font-size: clamp(1.4rem, 4vw, 2.8rem);
    color: #fff;
    text-shadow: 0 0 30px var(--neon-cyan), 0 0 60px var(--neon-pink);
    letter-spacing: 0.14em;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.4s;
    z-index: 10;
    white-space: nowrap;
  }
  #level-banner.show { opacity: 1; }

  /* =============================================
     NEW: COIN DISPLAY (top-left)
     ============================================= */
  #coin-display {
    position: absolute;
    top: 14px; left: 20px;
    font-family: 'Share Tech Mono', monospace;
    font-size: clamp(0.85rem, 1.8vw, 1.1rem);
    color: #ffd700;
    text-shadow: 0 0 8px #ffd700, 0 0 20px #ffd70066;
    pointer-events: none;
    letter-spacing: 0.06em;
  }

  /* =============================================
     NEW: LEVEL DISPLAY (top-left, below coins)
     ============================================= */
  #level-display {
    position: absolute;
    top: 36px; left: 20px;
    font-family: 'Share Tech Mono', monospace;
    font-size: clamp(0.7rem, 1.4vw, 0.88rem);
    color: rgba(57,255,20,0.7);
    pointer-events: none;
    letter-spacing: 0.05em;
    text-shadow: 0 0 6px #39ff14;
  }
</style>
</head>
<body>

<div id="game-wrap">
  <!-- Canvas (game renders here) -->
  <canvas id="c"></canvas>

  <!-- Score HUD -->
  <div id="score-display">SCORE: <span id="sc">0</span></div>
  <div id="best-display">BEST: <span id="best">0</span></div>

  <!-- NEW: Coin & Level HUD -->
  <div id="coin-display">🪙 <span id="coin-count">0</span></div>
  <div id="level-display">LVL: <span id="lvl-num">1</span></div>

  <!-- NEW: Level Banner -->
  <div id="level-banner" id="level-banner">LEVEL 1</div>

  <!-- ── START SCREEN ── -->
  <div class="screen" id="start-screen">
    <h1>CUBE DASH</h1>
    <p class="sub">JUMP OVER OBSTACLES · SURVIVE AS LONG AS POSSIBLE</p>
    <p class="sub">[ SPACE ] or [ CLICK ] to jump &nbsp;|&nbsp; Double-jump allowed</p>
    <p class="sub" style="color:rgba(255,215,0,0.7);">🪙 Collect coins · Level up every 200 pts</p>
    <button class="btn" id="start-btn">START GAME</button>
  </div>

  <!-- ── GAME OVER SCREEN ── -->
  <div class="screen hidden" id="gameover-screen">
    <h2>GAME OVER</h2>
    <div id="go-score"></div>
    <p class="sub" id="go-coins-msg" style="color:#ffd700;"></p>
    <p class="sub" id="go-best-msg"></p>
    <button class="btn" id="restart-btn">TRY AGAIN</button>
  </div>
</div>

<script>
/* ================================================================
   CUBE DASH — Pure JavaScript / HTML5 Canvas
   ================================================================
   Sections:
     1. Constants & Config
     2. State Variables
     3. Audio (Web Audio API beeps)
     4. Background / Parallax
     5. Player
     6. Obstacle Definitions & Factory
     7. Particle System
     8. Collision Detection
     9. Rendering
    10. Game Loop
    11. Difficulty Scaling
    12. Input Handling
    13. Screen Management
    14. Initialisation
   ================================================================ */

// ── 1. CONSTANTS & CONFIG ──────────────────────────────────────
const CANVAS_W = Math.min(window.innerWidth  - 40, 900);
const CANVAS_H = Math.min(window.innerHeight - 40, 460);
const GROUND_Y = CANVAS_H * 0.78;       // top of the ground strip
const GRAVITY   = 0.68;
const JUMP_V    = -14.5;
const PLAYER_SIZE = 34;
const PLAYER_X    = 110;
const START_SPEED = 5.5;
const MAX_SPEED   = 14;
const SPEED_INC   = 0.0012;             // speed grows per frame

const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
canvas.width  = CANVAS_W;
canvas.height = CANVAS_H;

// ── 2. STATE VARIABLES ─────────────────────────────────────────
let state = 'start';  // 'start' | 'playing' | 'dead'
let score = 0;
let bestScore = 0;
let speed = START_SPEED;
let frame = 0;
let animId;

// NEW: Level, coin, and float-shape state (declared here to avoid TDZ errors)
let currentLevel = 1;
let coins = [];
let totalCoins = 0;
let nextCoinIn = 120;
let floatShapes = [];
let nextFloatIn = 300;
let levelBannerTimeout = null;

const LEVEL_THRESHOLDS = [0, 200, 450, 750, 1100, 1500];
const LEVEL_PALETTES = [
  { primary: '#00f5ff', secondary: '#ff0080', ground: '#00f5ff', accent: '#9900ff' },
  { primary: '#bf00ff', secondary: '#ff6600', ground: '#bf00ff', accent: '#ff0080' },
  { primary: '#ff3300', secondary: '#ff9900', ground: '#ff3300', accent: '#ff0080' },
  { primary: '#00ff88', secondary: '#00ccff', ground: '#00ff88', accent: '#00f5ff' },
  { primary: '#ffd700', secondary: '#ff6600', ground: '#ffd700', accent: '#ffffff' },
];
const FLOAT_SHAPE_TYPES = ['diamond', 'orb', 'pentagon', 'arrow'];
const COIN_SIZE = 12;

// ── 3. AUDIO (Web Audio API — no files needed) ─────────────────
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx;
function ensureAudio() {
  if (!audioCtx) audioCtx = new AudioCtx();
}
function beep(freq, type, dur, vol = 0.15) {
  if (!audioCtx) return;
  try {
    const osc  = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.type = type;
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(freq * 0.5, audioCtx.currentTime + dur);
    gain.gain.setValueAtTime(vol, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
    osc.start(); osc.stop(audioCtx.currentTime + dur);
  } catch(e) {}
}
const sfxJump  = () => beep(520, 'square', 0.12);
const sfxDeath = () => beep(180, 'sawtooth', 0.4, 0.2);

// ── 4. BACKGROUND / PARALLAX ───────────────────────────────────
// Three layers: stars(far), grid lines(mid), city silhouette(near)
const stars = Array.from({length: 90}, () => ({
  x: Math.random() * CANVAS_W,
  y: Math.random() * GROUND_Y * 0.85,
  r: Math.random() * 1.5 + 0.3,
  spd: Math.random() * 0.4 + 0.1
}));

const cityBlocks = Array.from({length: 18}, (_, i) => ({
  x: i * 56 + Math.random() * 30,
  w: 28 + Math.random() * 30,
  h: 30 + Math.random() * 60
}));

let gridOffsetX = 0;

function drawBackground() {
  // Sky gradient — shifts color by level
  const levelHue = currentLevel * 40;
  const sky = ctx.createLinearGradient(0, 0, 0, GROUND_Y);
  const skyColors = [
    ['#030310', '#0a0a25'],   // Level 1: deep blue
    ['#0d0318', '#150526'],   // Level 2: dark purple
    ['#100003', '#220a00'],   // Level 3: dark red
    ['#001008', '#001a10'],   // Level 4: dark green
    ['#100d00', '#1a1500'],   // Level 5: dark gold
  ];
  const ci = Math.min(currentLevel - 1, skyColors.length - 1);
  sky.addColorStop(0, skyColors[ci][0]);
  sky.addColorStop(1, skyColors[ci][1]);
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, CANVAS_W, GROUND_Y);

  // Stars (parallax layer 1 — slowest)
  ctx.fillStyle = 'rgba(0,245,255,0.7)';
  for (const s of stars) {
    s.x -= s.spd * (speed / START_SPEED);
    if (s.x < 0) { s.x = CANVAS_W; s.y = Math.random() * GROUND_Y * 0.85; }
    ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2); ctx.fill();
  }

  // Perspective grid (layer 2)
  gridOffsetX = (gridOffsetX + speed * 0.5) % 60;
  ctx.strokeStyle = levelGridColor();
  ctx.lineWidth = 1;
  const horizon = GROUND_Y * 0.55;
  for (let x = -gridOffsetX; x < CANVAS_W + 60; x += 60) {
    ctx.beginPath();
    ctx.moveTo(x, GROUND_Y);
    ctx.lineTo(CANVAS_W / 2 + (x - CANVAS_W / 2) * 0.1, horizon);
    ctx.stroke();
  }
  for (let t = 0; t <= 1; t += 0.12) {
    const y = horizon + (GROUND_Y - horizon) * t;
    const scl = t;
    const x0 = CANVAS_W / 2 - (CANVAS_W / 2) * scl;
    const x1 = CANVAS_W / 2 + (CANVAS_W / 2) * scl;
    ctx.beginPath(); ctx.moveTo(x0, y); ctx.lineTo(x1, y); ctx.stroke();
  }

  // City silhouette (layer 3 — medium speed)
  ctx.fillStyle = 'rgba(0,10,30,0.9)';
  for (const b of cityBlocks) {
    b.x -= speed * 0.15;
    if (b.x + b.w < 0) { b.x = CANVAS_W + Math.random() * 40; b.h = 30 + Math.random() * 60; }
    ctx.fillRect(b.x, GROUND_Y - b.h, b.w, b.h);
    // window glows
    ctx.fillStyle = 'rgba(0,245,255,0.08)';
    for (let wy = GROUND_Y - b.h + 8; wy < GROUND_Y - 6; wy += 10)
      for (let wx = b.x + 4; wx < b.x + b.w - 4; wx += 8)
        ctx.fillRect(wx, wy, 4, 5);
    ctx.fillStyle = 'rgba(0,10,30,0.9)';
  }

  // Ground
  const grd = ctx.createLinearGradient(0, GROUND_Y, 0, CANVAS_H);
  grd.addColorStop(0, '#0d0d2b');
  grd.addColorStop(1, '#050510');
  ctx.fillStyle = grd;
  ctx.fillRect(0, GROUND_Y, CANVAS_W, CANVAS_H - GROUND_Y);

  // Ground line glow
  ctx.strokeStyle = '#00f5ff';
  ctx.lineWidth = 2;
  ctx.shadowColor = '#00f5ff';
  ctx.shadowBlur  = 10;
  ctx.beginPath(); ctx.moveTo(0, GROUND_Y); ctx.lineTo(CANVAS_W, GROUND_Y); ctx.stroke();
  ctx.shadowBlur = 0;

  // Ground grid lines scrolling
  ctx.strokeStyle = 'rgba(0,245,255,0.12)';
  ctx.lineWidth = 1;
  const gx = (frame * speed * 0.6) % 60;
  for (let x = -gx; x < CANVAS_W; x += 60) {
    ctx.beginPath(); ctx.moveTo(x, GROUND_Y); ctx.lineTo(x, CANVAS_H); ctx.stroke();
  }
}

// ── 5. PLAYER ─────────────────────────────────────────────────
const player = {
  x: PLAYER_X,
  y: GROUND_Y - PLAYER_SIZE,
  vy: 0,
  rot: 0,                 // rotation in radians
  jumpsLeft: 2,           // double-jump
  onGround: false,
  trailPts: [],           // motion trail

  reset() {
    this.y = GROUND_Y - PLAYER_SIZE;
    this.vy = 0; this.rot = 0; this.jumpsLeft = 2; this.onGround = true;
    this.trailPts = [];
  },

  jump() {
    if (this.jumpsLeft > 0) {
      this.vy = JUMP_V;
      this.jumpsLeft--;
      sfxJump();
      spawnJumpParticles(this.x + PLAYER_SIZE / 2, this.y + PLAYER_SIZE);
    }
  },

  update() {
    this.vy += GRAVITY;
    this.y  += this.vy;

    this.onGround = this.y >= GROUND_Y - PLAYER_SIZE;
    if (this.onGround) {
      this.y = GROUND_Y - PLAYER_SIZE;
      this.vy = 0;
      this.jumpsLeft = 2;
      this.rot = Math.round(this.rot / (Math.PI / 2)) * (Math.PI / 2); // snap rotation
    } else {
      this.rot += 0.09;  // spin while airborne
    }

    // Trail
    this.trailPts.unshift({ x: this.x + PLAYER_SIZE / 2, y: this.y + PLAYER_SIZE / 2 });
    if (this.trailPts.length > 14) this.trailPts.pop();
  },

  draw() {
    // Motion trail
    for (let i = 0; i < this.trailPts.length; i++) {
      const a = (1 - i / this.trailPts.length) * 0.35;
      ctx.fillStyle = `rgba(0,245,255,${a})`;
      const s = PLAYER_SIZE * (1 - i / this.trailPts.length) * 0.6;
      ctx.fillRect(this.trailPts[i].x - s / 2, this.trailPts[i].y - s / 2, s, s);
    }

    // Player cube
    ctx.save();
    ctx.translate(this.x + PLAYER_SIZE / 2, this.y + PLAYER_SIZE / 2);
    ctx.rotate(this.rot);

    const hs = PLAYER_SIZE / 2;

    // Outer glow border
    ctx.shadowColor = '#00f5ff';
    ctx.shadowBlur  = 18;
    ctx.strokeStyle = '#00f5ff';
    ctx.lineWidth   = 2.5;
    ctx.strokeRect(-hs, -hs, PLAYER_SIZE, PLAYER_SIZE);

    // Fill
    const fill = ctx.createLinearGradient(-hs, -hs, hs, hs);
    fill.addColorStop(0, '#002a30');
    fill.addColorStop(1, '#004050');
    ctx.fillStyle = fill;
    ctx.fillRect(-hs, -hs, PLAYER_SIZE, PLAYER_SIZE);

    // Inner cross / design
    ctx.strokeStyle = 'rgba(0,245,255,0.5)';
    ctx.lineWidth = 1;
    ctx.shadowBlur = 0;
    ctx.beginPath();
    ctx.moveTo(-hs + 4, -hs + 4); ctx.lineTo(hs - 4, hs - 4);
    ctx.moveTo(hs - 4,  -hs + 4); ctx.lineTo(-hs + 4, hs - 4);
    ctx.stroke();

    // Center dot
    ctx.fillStyle = '#00f5ff';
    ctx.shadowColor = '#00f5ff'; ctx.shadowBlur = 8;
    ctx.beginPath(); ctx.arc(0, 0, 3, 0, Math.PI * 2); ctx.fill();
    ctx.shadowBlur = 0;

    ctx.restore();
  },

  // Axis-aligned bounding box for collision
  bbox() {
    const margin = 5;  // slight forgiveness
    return {
      left:   this.x + margin,
      right:  this.x + PLAYER_SIZE - margin,
      top:    this.y + margin,
      bottom: this.y + PLAYER_SIZE - margin
    };
  }
};

// ── 6. OBSTACLE DEFINITIONS & FACTORY ────────────────────────
/*
   Types:
     'spike'   — triangle pointing up (instant death on touch)
     'block'   — solid rectangle player must jump over
     'tall'    — double-height block
     'gap'     — hole in ground (player must jump across)
     'cluster' — group of 2–3 spikes close together
*/

let obstacles = [];
let nextObstacleIn = 90;  // frames until next obstacle spawns

const OBS_COLORS = {
  spike:   { fill: '#ff0080', stroke: '#ff88cc', glow: '#ff0080' },
  block:   { fill: '#1a0035', stroke: '#9900ff', glow: '#9900ff' },
  tall:    { fill: '#100028', stroke: '#cc00ff', glow: '#cc00ff' },
  gap:     { fill: '#000010', stroke: '#ff0050', glow: '#ff0050' },
  cluster: { fill: '#ff0080', stroke: '#ffaacc', glow: '#ff0080' }
};

function createSpike(x, scale = 1) {
  const w = 30 * scale, h = 36 * scale;
  return {
    type: 'spike', x, y: GROUND_Y - h, w, h, scale,
    get bbox() {
      // triangle bbox (smaller than full rect for fairness)
      return { left: this.x + 5, right: this.x + this.w - 5, top: this.y + 8, bottom: this.y + this.h };
    }
  };
}

function createBlock(x, scale = 1) {
  const w = 44 * scale, h = 38 * scale;
  return {
    type: 'block', x, y: GROUND_Y - h, w, h,
    get bbox() { return { left: this.x + 2, right: this.x + this.w - 2, top: this.y + 2, bottom: this.y + this.h }; }
  };
}

function createTall(x) {
  const w = 38, h = 72;
  return {
    type: 'tall', x, y: GROUND_Y - h, w, h,
    get bbox() { return { left: this.x + 2, right: this.x + this.w - 2, top: this.y + 2, bottom: this.y + this.h }; }
  };
}

function createGap(x) {
  const w = 70 + Math.random() * 30;
  return {
    type: 'gap', x, y: GROUND_Y, w, h: CANVAS_H - GROUND_Y,
    get bbox() { return { left: this.x, right: this.x + this.w, top: GROUND_Y, bottom: CANVAS_H }; }
  };
}

function createCluster(x) {
  const count = 2 + Math.floor(Math.random() * 2);
  const spikes = [];
  let cx = x;
  for (let i = 0; i < count; i++) {
    const s = 0.7 + Math.random() * 0.6;
    spikes.push(createSpike(cx, s));
    cx += 28 * s + 4;
  }
  return { type: 'cluster', spikes, x, w: cx - x, isMeta: true };
}

function spawnObstacle() {
  const types = ['spike', 'block', 'tall', 'gap', 'cluster'];
  // weight: gaps and clusters appear less early on
  const weights = [30, 25, 20, score > 200 ? 15 : 5, score > 100 ? 10 : 3];
  const total = weights.reduce((a, b) => a + b, 0);
  let r = Math.random() * total;
  let pick = 0;
  for (let i = 0; i < weights.length; i++) { r -= weights[i]; if (r <= 0) { pick = i; break; } }
  const type = types[pick];
  const x = CANVAS_W + 20;

  let obs;
  if (type === 'spike')   obs = createSpike(x);
  else if (type === 'block')  obs = createBlock(x);
  else if (type === 'tall')   obs = createTall(x);
  else if (type === 'gap')    obs = createGap(x);
  else                        obs = createCluster(x);

  obstacles.push(obs);
}

function updateObstacles() {
  // Move all obstacles left
  for (const obs of obstacles) {
    obs.x -= speed;
    if (obs.isMeta) {
      for (const s of obs.spikes) s.x -= speed;
    }
  }
  // Remove off-screen obstacles
  obstacles = obstacles.filter(o => o.x + (o.w || 80) > -20);

  // Spawn new obstacles
  nextObstacleIn--;
  if (nextObstacleIn <= 0) {
    spawnObstacle();
    const minGap = Math.max(40, 90 - score / 8);
    nextObstacleIn = Math.floor(minGap + Math.random() * 70);
  }
}

function drawObstacle(obs) {
  if (obs.isMeta) {
    for (const s of obs.spikes) drawObstacle(s);
    return;
  }
  const col = OBS_COLORS[obs.type] || OBS_COLORS.block;
  ctx.save();
  ctx.shadowColor = col.glow; ctx.shadowBlur = 14;

  if (obs.type === 'spike') {
    // Triangle
    ctx.beginPath();
    ctx.moveTo(obs.x + obs.w / 2, obs.y);
    ctx.lineTo(obs.x,              obs.y + obs.h);
    ctx.lineTo(obs.x + obs.w,      obs.y + obs.h);
    ctx.closePath();
    ctx.fillStyle = col.fill; ctx.fill();
    ctx.strokeStyle = col.stroke; ctx.lineWidth = 1.5; ctx.stroke();

  } else if (obs.type === 'gap') {
    // Dark pit with glowing edges
    ctx.fillStyle = '#000008';
    ctx.fillRect(obs.x, obs.y, obs.w, obs.h);
    ctx.strokeStyle = col.glow; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(obs.x, GROUND_Y); ctx.lineTo(obs.x, CANVAS_H); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(obs.x + obs.w, GROUND_Y); ctx.lineTo(obs.x + obs.w, CANVAS_H); ctx.stroke();

  } else {
    // Rectangular block
    ctx.fillStyle = col.fill;
    ctx.fillRect(obs.x, obs.y, obs.w, obs.h);
    ctx.strokeStyle = col.stroke; ctx.lineWidth = 2;
    ctx.strokeRect(obs.x, obs.y, obs.w, obs.h);
    // inner shine
    ctx.strokeStyle = 'rgba(255,255,255,0.08)';
    ctx.lineWidth = 1;
    ctx.strokeRect(obs.x + 3, obs.y + 3, obs.w - 6, obs.h - 6);
  }
  ctx.restore();
}

// ── 7. PARTICLE SYSTEM ────────────────────────────────────────
let particles = [];

function spawnJumpParticles(x, y) {
  for (let i = 0; i < 8; i++) {
    particles.push({
      x, y,
      vx: (Math.random() - 0.5) * 4,
      vy: Math.random() * -3 - 1,
      life: 1, decay: 0.06 + Math.random() * 0.04,
      r: 2 + Math.random() * 3,
      color: Math.random() < 0.5 ? '#00f5ff' : '#ffffff'
    });
  }
}

function spawnDeathParticles(x, y) {
  for (let i = 0; i < 28; i++) {
    const angle = (Math.PI * 2 / 28) * i + Math.random() * 0.3;
    const spd   = 2 + Math.random() * 6;
    particles.push({
      x, y,
      vx: Math.cos(angle) * spd,
      vy: Math.sin(angle) * spd,
      life: 1, decay: 0.02 + Math.random() * 0.04,
      r: 3 + Math.random() * 5,
      color: ['#ff0080','#00f5ff','#ffe600','#ff4400'][Math.floor(Math.random() * 4)]
    });
  }
}

function updateParticles() {
  for (const p of particles) {
    p.x += p.vx; p.y += p.vy;
    p.vy += 0.15;  // gravity
    p.life -= p.decay;
  }
  particles = particles.filter(p => p.life > 0);
}

function drawParticles() {
  for (const p of particles) {
    ctx.globalAlpha = p.life;
    ctx.shadowColor = p.color; ctx.shadowBlur = 8;
    ctx.fillStyle   = p.color;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI * 2); ctx.fill();
  }
  ctx.globalAlpha = 1; ctx.shadowBlur = 0;
}

// ── 8. COLLISION DETECTION ────────────────────────────────────
function rectsOverlap(a, b) {
  return a.left < b.right && a.right > b.left && a.top < b.bottom && a.bottom > b.top;
}

function checkCollisions() {
  const pb = player.bbox();

  for (const obs of obstacles) {
    if (obs.isMeta) {
      // Cluster: check each spike
      for (const s of obs.spikes) {
        if (rectsOverlap(pb, s.bbox)) return true;
      }
      continue;
    }

    if (obs.type === 'gap') {
      // Kill player if they fall into the gap while on ground level
      if (player.onGround && pb.left > obs.x && pb.right < obs.x + obs.w) return true;
      // Also check if player drops through
      if (pb.bottom >= GROUND_Y && pb.left < obs.x + obs.w && pb.right > obs.x) return true;
      continue;
    }

    if (rectsOverlap(pb, obs.bbox)) return true;
  }
  return false;
}

// ── 9. RENDERING ──────────────────────────────────────────────
function drawHUD() {
  // Progress bar at top
  const pct = Math.min(score / 1000, 1);
  ctx.fillStyle = 'rgba(0,245,255,0.12)';
  ctx.fillRect(0, 0, CANVAS_W, 4);
  const barGrad = ctx.createLinearGradient(0, 0, CANVAS_W * pct, 0);
  barGrad.addColorStop(0, '#00f5ff');
  barGrad.addColorStop(1, '#ff0080');
  ctx.fillStyle = barGrad;
  ctx.fillRect(0, 0, CANVAS_W * pct, 4);

  // Speed indicator
  const spd = ((speed - START_SPEED) / (MAX_SPEED - START_SPEED) * 100).toFixed(0);
  ctx.fillStyle = 'rgba(255,230,0,0.5)';
  ctx.font = `${Math.floor(CANVAS_H * 0.026)}px Share Tech Mono, monospace`;
  ctx.fillText(`×${(speed / START_SPEED).toFixed(1)}`, 12, CANVAS_H * 0.052);
}

function render() {
  ctx.clearRect(0, 0, CANVAS_W, CANVAS_H);
  drawBackground();
  drawCoins();
  for (const obs of obstacles) drawObstacle(obs);
  if (typeof floatShapes !== 'undefined') {
    for (const s of floatShapes) drawFloatShape(s);
  }
  player.draw();
  drawParticles();
  if (state === 'playing') {
    drawHUD();
    if (typeof drawStatBars === 'function')   drawStatBars();
    if (typeof drawShapeIconBar === 'function') drawShapeIconBar();
  }
}

// ── 10. GAME LOOP ─────────────────────────────────────────────
function gameLoop() {
  frame++;

  if (state === 'playing') {
    // Update speed
    speed = Math.min(MAX_SPEED, START_SPEED + frame * SPEED_INC);

    player.update();
    updateObstacles();
    updateParticles();
    updateCoins();
    if (typeof updateFloatShapes === 'function') updateFloatShapes();
    checkLevelUp();

    // Score (distance-based)
    score = Math.floor(frame * 0.15);
    document.getElementById('sc').textContent = score;

    // Collision check
    if (checkCollisions()) {
      triggerDeath();
      return;
    }
  } else {
    // Still animate background on screens
    updateParticles();
  }

  render();
  animId = requestAnimationFrame(gameLoop);
}

// ── 11. DIFFICULTY SCALING ────────────────────────────────────
// (Handled inline: speed increases per frame, gap intervals shrink with score)

// ── 12. INPUT HANDLING ────────────────────────────────────────
function handleJump() {
  if (state === 'playing') {
    ensureAudio();
    player.jump();
  }
}

document.addEventListener('keydown', e => {
  if (e.code === 'Space' || e.code === 'ArrowUp') {
    e.preventDefault();
    handleJump();
  }
});

canvas.addEventListener('pointerdown', e => {
  e.preventDefault();
  handleJump();
});

// ── 13. SCREEN MANAGEMENT ────────────────────────────────────
function showScreen(id) {
  document.getElementById('start-screen').classList.add('hidden');
  document.getElementById('gameover-screen').classList.add('hidden');
  if (id) document.getElementById(id).classList.remove('hidden');
}

function triggerDeath() {
  state = 'dead';
  sfxDeath();
  spawnDeathParticles(player.x + PLAYER_SIZE / 2, player.y + PLAYER_SIZE / 2);
  if (score > bestScore) {
    bestScore = score;
    document.getElementById('best').textContent = bestScore;
  }
  document.getElementById('go-score').textContent = `SCORE: ${score}`;
  document.getElementById('go-best-msg').textContent =
    score >= bestScore ? '★ NEW BEST! ★' : `BEST: ${bestScore}`;
  // NEW: show coins on game over
  document.getElementById('go-coins-msg').textContent = `🪙 COINS COLLECTED: ${totalCoins}`;
  showScreen('gameover-screen');
  // Keep loop running for particles
  animId = requestAnimationFrame(gameLoop);
}

function startGame() {
  ensureAudio();
  cancelAnimationFrame(animId);
  // Reset all state
  state = 'playing';
  frame = 0;
  score = 0;
  speed = START_SPEED;
  obstacles = [];
  particles = [];
  nextObstacleIn = 80;
  player.reset();
  document.getElementById('sc').textContent = '0';
  // NEW: reset extras
  coins = [];
  totalCoins = 0;
  currentLevel = 1;
  document.getElementById('coin-count').textContent = '0';
  document.getElementById('lvl-num').textContent = '1';
  showScreen(null);  // hide all overlays
  showLevelBanner(1);
  gameLoop();
}

document.getElementById('start-btn').addEventListener('click', startGame);
document.getElementById('restart-btn').addEventListener('click', startGame);

// ── 14. INITIALISATION ───────────────────────────────────────
// Run background animation immediately on start screen
state = 'start';
showScreen('start-screen');
gameLoop();

// ══════════════════════════════════════════════════════════════
// NEW A: LEVEL SYSTEM
// ══════════════════════════════════════════════════════════════
// (LEVEL_THRESHOLDS, LEVEL_PALETTES declared at top to avoid TDZ)

function levelGridColor() {
  const p = LEVEL_PALETTES[Math.min(currentLevel - 1, LEVEL_PALETTES.length - 1)];
  return `rgba(${hexToRgb(p.primary)},0.07)`;
}

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `${r},${g},${b}`;
}

function checkLevelUp() {
  for (let lv = LEVEL_THRESHOLDS.length - 1; lv >= 1; lv--) {
    if (score >= LEVEL_THRESHOLDS[lv] && currentLevel < lv + 1) {
      currentLevel = lv + 1;
      document.getElementById('lvl-num').textContent = currentLevel;
      showLevelBanner(currentLevel);
      beep(880, 'square', 0.3, 0.2);
      spawnLevelUpParticles();
      break;
    }
  }
}

function showLevelBanner(lv) {
  const el = document.getElementById('level-banner');
  el.textContent = `LEVEL ${lv}`;
  el.classList.add('show');
  clearTimeout(levelBannerTimeout);
  levelBannerTimeout = setTimeout(() => el.classList.remove('show'), 1800);
}

function spawnLevelUpParticles() {
  for (let i = 0; i < 40; i++) {
    const x = Math.random() * CANVAS_W;
    const y = Math.random() * GROUND_Y;
    const colors = ['#ffd700','#ff0080','#00f5ff','#39ff14','#bf00ff'];
    particles.push({
      x, y,
      vx: (Math.random() - 0.5) * 8,
      vy: (Math.random() - 0.5) * 8 - 3,
      life: 1, decay: 0.015 + Math.random() * 0.02,
      r: 4 + Math.random() * 6,
      color: colors[Math.floor(Math.random() * colors.length)]
    });
  }
}

// ══════════════════════════════════════════════════════════════
// NEW B: COIN SYSTEM
// ══════════════════════════════════════════════════════════════
// (COIN_SIZE declared at top to avoid TDZ)

function spawnCoin() {
  // Coins float at various heights above the ground
  const heightOptions = [
    GROUND_Y - 50,   // low — reachable without jump
    GROUND_Y - 100,  // mid — requires jump
    GROUND_Y - 170,  // high — requires double jump
  ];
  const y = heightOptions[Math.floor(Math.random() * heightOptions.length)];
  coins.push({
    x: CANVAS_W + 30,
    y,
    collected: false,
    bobOffset: Math.random() * Math.PI * 2,
    color: Math.random() < 0.15 ? '#00f5ff' : '#ffd700', // rare blue coin
    value: Math.random() < 0.15 ? 5 : 1
  });
}

function updateCoins() {
  for (const c of coins) {
    c.x -= speed * 0.95;
  }
  coins = coins.filter(c => c.x > -40 && !c.collected);

  // Collect coins
  const pb = player.bbox();
  for (const c of coins) {
    const cx = c.x, cy = c.y + Math.sin(frame * 0.08 + c.bobOffset) * 5;
    if (pb.left < cx + COIN_SIZE && pb.right > cx - COIN_SIZE &&
        pb.top  < cy + COIN_SIZE && pb.bottom > cy - COIN_SIZE) {
      c.collected = true;
      totalCoins += c.value;
      document.getElementById('coin-count').textContent = totalCoins;
      spawnCoinCollectParticles(cx, cy, c.color);
      beep(c.value > 1 ? 1200 : 900, 'sine', 0.08, 0.12);
    }
  }

  // Spawn
  nextCoinIn--;
  if (nextCoinIn <= 0) {
    spawnCoin();
    nextCoinIn = 60 + Math.floor(Math.random() * 80);
  }
}

function drawCoins() {
  for (const c of coins) {
    const bobY = c.y + Math.sin(frame * 0.08 + c.bobOffset) * 5;
    ctx.save();
    ctx.shadowColor = c.color;
    ctx.shadowBlur  = 12;

    // Outer ring
    ctx.strokeStyle = c.color;
    ctx.lineWidth = 2.5;
    ctx.beginPath(); ctx.arc(c.x, bobY, COIN_SIZE, 0, Math.PI * 2); ctx.stroke();

    // Inner fill
    const cg = ctx.createRadialGradient(c.x - 3, bobY - 3, 1, c.x, bobY, COIN_SIZE);
    cg.addColorStop(0, c.color === '#ffd700' ? '#fff5aa' : '#aaffff');
    cg.addColorStop(1, c.color === '#ffd700' ? '#ff9900' : '#0055ff');
    ctx.fillStyle = cg;
    ctx.beginPath(); ctx.arc(c.x, bobY, COIN_SIZE - 1, 0, Math.PI * 2); ctx.fill();

    // Star / dollar symbol
    ctx.fillStyle = 'rgba(255,255,255,0.7)';
    ctx.font = `bold ${COIN_SIZE}px Arial`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.shadowBlur = 0;
    ctx.fillText(c.value > 1 ? '★' : '$', c.x, bobY);

    ctx.restore();
  }
  ctx.textAlign = 'left'; ctx.textBaseline = 'alphabetic';
}

function spawnCoinCollectParticles(x, y, color) {
  for (let i = 0; i < 10; i++) {
    const angle = (Math.PI * 2 / 10) * i;
    particles.push({
      x, y,
      vx: Math.cos(angle) * (2 + Math.random() * 3),
      vy: Math.sin(angle) * (2 + Math.random() * 3),
      life: 1, decay: 0.04 + Math.random() * 0.04,
      r: 2 + Math.random() * 3,
      color
    });
  }
}

// ══════════════════════════════════════════════════════════════
// NEW C: STAT BARS (top of screen)
// ══════════════════════════════════════════════════════════════
function drawStatBars() {
  const barW = 120;
  const barH = 7;
  const startX = CANVAS_W / 2 - barW - 10;
  const startY = 10;
  const palette = LEVEL_PALETTES[Math.min(currentLevel - 1, LEVEL_PALETTES.length - 1)];

  // ── Health bar (always full — cosmetic / lives-style)
  drawSingleBar(startX, startY, barW, barH, 1.0, '#ff3333', '#ff9999', 'HP');

  // ── Speed bar
  const speedPct = Math.min((speed - START_SPEED) / (MAX_SPEED - START_SPEED), 1);
  drawSingleBar(startX + barW + 20, startY, barW, barH, speedPct, palette.primary, '#ffffff', 'SPD');

  // ── Level progress bar
  const lvlMin = LEVEL_THRESHOLDS[currentLevel - 1] || 0;
  const lvlMax = LEVEL_THRESHOLDS[currentLevel] || LEVEL_THRESHOLDS[LEVEL_THRESHOLDS.length - 1] + 200;
  const lvlPct = Math.min((score - lvlMin) / (lvlMax - lvlMin), 1);
  const barX3 = startX + (barW + 20) * 2;
  drawSingleBar(barX3, startY, barW, barH, lvlPct, '#ffd700', '#fff4aa', 'XP');
}

function drawSingleBar(x, y, w, h, pct, colorA, colorB, label) {
  ctx.save();

  // Label
  ctx.font = `bold ${h + 2}px Share Tech Mono, monospace`;
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.fillText(label, x, y + h);

  const bx = x + 24;
  // Background track
  ctx.fillStyle = 'rgba(255,255,255,0.08)';
  ctx.fillRect(bx, y, w, h);

  // Fill gradient
  const grad = ctx.createLinearGradient(bx, 0, bx + w, 0);
  grad.addColorStop(0, colorA);
  grad.addColorStop(1, colorB);
  ctx.fillStyle = grad;
  ctx.shadowColor = colorA;
  ctx.shadowBlur = 8;
  ctx.fillRect(bx, y, Math.max(2, w * pct), h);

  // Border
  ctx.strokeStyle = 'rgba(255,255,255,0.15)';
  ctx.lineWidth = 0.5;
  ctx.shadowBlur = 0;
  ctx.strokeRect(bx, y, w, h);

  ctx.restore();
}

// ══════════════════════════════════════════════════════════════
// NEW D: FLOATING SHAPE OBSTACLES (diamond, pentagon, orb ring)
// ══════════════════════════════════════════════════════════════
// These are visual hazard shapes that float at mid-air heights
// (FLOAT_SHAPE_TYPES declared at top to avoid TDZ) = ['diamond', 'orb', 'pentagon', 'arrow'];

function spawnFloatShape() {
  if (currentLevel < 2) return; // only appear from level 2+
  const type = FLOAT_SHAPE_TYPES[Math.floor(Math.random() * FLOAT_SHAPE_TYPES.length)];
  const heightY = GROUND_Y - 90 - Math.random() * 80;
  const colors = ['#ff0080','#bf00ff','#00f5ff','#ff6600'];
  floatShapes.push({
    type,
    x: CANVAS_W + 40,
    y: heightY,
    baseY: heightY,
    size: 22 + Math.random() * 14,
    color: colors[Math.floor(Math.random() * colors.length)],
    rot: 0,
    rotSpd: (Math.random() - 0.5) * 0.06,
    bobAmp: 10 + Math.random() * 15,
    bobSpeed: 0.03 + Math.random() * 0.02,
    phase: Math.random() * Math.PI * 2,
    collected: false
  });
}

function updateFloatShapes() {
  for (const s of floatShapes) {
    s.x -= speed;
    s.y = s.baseY + Math.sin(frame * s.bobSpeed + s.phase) * s.bobAmp;
    s.rot += s.rotSpd;
  }
  floatShapes = floatShapes.filter(s => s.x + s.size > -20);

  // Collision with player
  const pb = player.bbox();
  for (const s of floatShapes) {
    const dx = (pb.left + pb.right) / 2 - s.x;
    const dy = (pb.top + pb.bottom) / 2 - s.y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (dist < s.size * 0.75 && !s.collected) {
      // Floating shapes that the player hits act as instant-death obstacles
      triggerDeath();
      return;
    }
  }

  nextFloatIn--;
  if (nextFloatIn <= 0) {
    spawnFloatShape();
    nextFloatIn = 180 + Math.floor(Math.random() * 200);
  }
}

function drawFloatShape(s) {
  ctx.save();
  ctx.translate(s.x, s.y);
  ctx.rotate(s.rot);
  ctx.shadowColor = s.color;
  ctx.shadowBlur = 18;
  ctx.strokeStyle = s.color;
  ctx.fillStyle = s.color + '33'; // semi-transparent fill
  ctx.lineWidth = 2.5;

  const sz = s.size;
  ctx.beginPath();

  if (s.type === 'diamond') {
    ctx.moveTo(0, -sz);
    ctx.lineTo(sz * 0.6, 0);
    ctx.lineTo(0, sz);
    ctx.lineTo(-sz * 0.6, 0);
    ctx.closePath();

  } else if (s.type === 'orb') {
    // Double concentric rings
    ctx.arc(0, 0, sz, 0, Math.PI * 2);
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(0, 0, sz * 0.55, 0, Math.PI * 2);

  } else if (s.type === 'pentagon') {
    for (let i = 0; i < 5; i++) {
      const a = (i / 5) * Math.PI * 2 - Math.PI / 2;
      if (i === 0) ctx.moveTo(Math.cos(a) * sz, Math.sin(a) * sz);
      else         ctx.lineTo(Math.cos(a) * sz, Math.sin(a) * sz);
    }
    ctx.closePath();

  } else if (s.type === 'arrow') {
    // Right-pointing chevron / arrow
    ctx.moveTo(-sz, -sz * 0.5);
    ctx.lineTo(0,   0);
    ctx.lineTo(-sz,  sz * 0.5);
    ctx.moveTo(0,   -sz * 0.5);
    ctx.lineTo(sz,   0);
    ctx.lineTo(0,    sz * 0.5);
    ctx.stroke();
    ctx.restore();
    return;
  }

  ctx.fill();
  ctx.stroke();

  // Inner glow dot
  ctx.fillStyle = s.color;
  ctx.shadowBlur = 6;
  ctx.beginPath(); ctx.arc(0, 0, 3, 0, Math.PI * 2); ctx.fill();

  ctx.restore();
}

// ══════════════════════════════════════════════════════════════
// NEW E: SHAPE ICON BAR (bottom of screen — cosmetic display)
// ══════════════════════════════════════════════════════════════
const ICON_SHAPES = ['cube','spike','diamond','orb','star','pentagon'];
let iconPulse = 0;

function drawShapeIconBar() {
  const barH = CANVAS_H - GROUND_Y;                 // height of ground strip
  const iconAreaY = GROUND_Y + barH * 0.18;         // vertical center of icon bar
  const iconSize  = Math.min(barH * 0.38, 14);
  const count     = ICON_SHAPES.length;
  const totalW    = count * (iconSize * 2 + 14);
  let startX      = (CANVAS_W - totalW) / 2 + iconSize;

  iconPulse += 0.04;

  // Bar background
  ctx.save();
  ctx.fillStyle = 'rgba(0,245,255,0.04)';
  ctx.fillRect(startX - iconSize - 8, GROUND_Y + 4, totalW + 16, barH - 8);
  ctx.strokeStyle = 'rgba(0,245,255,0.12)';
  ctx.lineWidth = 1;
  ctx.strokeRect(startX - iconSize - 8, GROUND_Y + 4, totalW + 16, barH - 8);
  ctx.restore();

  const palette = LEVEL_PALETTES[Math.min(currentLevel - 1, LEVEL_PALETTES.length - 1)];
  const colors = [palette.primary, '#ff0080', '#ffd700', '#bf00ff', '#39ff14', '#ff6600'];

  ICON_SHAPES.forEach((shape, i) => {
    const cx = startX + i * (iconSize * 2 + 14);
    const cy = iconAreaY;
    const pulse = 0.85 + 0.15 * Math.sin(iconPulse + i * 0.8);
    const sz = iconSize * pulse;
    const col = colors[i % colors.length];

    ctx.save();
    ctx.translate(cx, cy);
    ctx.shadowColor = col;
    ctx.shadowBlur = 8 * pulse;
    ctx.strokeStyle = col;
    ctx.fillStyle   = col + '44';
    ctx.lineWidth   = 1.5;

    ctx.beginPath();
    if (shape === 'cube') {
      ctx.strokeRect(-sz, -sz, sz * 2, sz * 2);
      ctx.fillRect(-sz, -sz, sz * 2, sz * 2);
    } else if (shape === 'spike') {
      ctx.moveTo(0, -sz * 1.2);
      ctx.lineTo(sz * 0.8, sz * 0.8);
      ctx.lineTo(-sz * 0.8, sz * 0.8);
      ctx.closePath();
      ctx.fill(); ctx.stroke();
    } else if (shape === 'diamond') {
      ctx.moveTo(0, -sz * 1.2);
      ctx.lineTo(sz * 0.8, 0);
      ctx.lineTo(0, sz * 1.2);
      ctx.lineTo(-sz * 0.8, 0);
      ctx.closePath();
      ctx.fill(); ctx.stroke();
    } else if (shape === 'orb') {
      ctx.arc(0, 0, sz, 0, Math.PI * 2);
      ctx.fill(); ctx.stroke();
      ctx.beginPath();
      ctx.arc(0, 0, sz * 0.4, 0, Math.PI * 2);
      ctx.fillStyle = col;
      ctx.fill();
    } else if (shape === 'star') {
      for (let p = 0; p < 5; p++) {
        const outer = (p / 5) * Math.PI * 2 - Math.PI / 2;
        const inner = outer + Math.PI / 5;
        if (p === 0) ctx.moveTo(Math.cos(outer) * sz, Math.sin(outer) * sz);
        else         ctx.lineTo(Math.cos(outer) * sz, Math.sin(outer) * sz);
        ctx.lineTo(Math.cos(inner) * sz * 0.45, Math.sin(inner) * sz * 0.45);
      }
      ctx.closePath();
      ctx.fill(); ctx.stroke();
    } else if (shape === 'pentagon') {
      for (let p = 0; p < 5; p++) {
        const a = (p / 5) * Math.PI * 2 - Math.PI / 2;
        if (p === 0) ctx.moveTo(Math.cos(a) * sz, Math.sin(a) * sz);
        else         ctx.lineTo(Math.cos(a) * sz, Math.sin(a) * sz);
      }
      ctx.closePath();
      ctx.fill(); ctx.stroke();
    }

    ctx.restore();
  });
}

// (render and gameLoop already include all new systems above)
